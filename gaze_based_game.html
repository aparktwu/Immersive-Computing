<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Gaze VR Game – Endless Floor</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
</head>

<body>

<a-scene background="color: #111">

  <!-- PLAYER -->
  <a-entity id="player" movement>
    <a-camera id="camera">

      <!-- GAZE CURSOR -->
      <a-cursor
        fuse="true"
        fuse-timeout="1000"
        color="yellow"
        geometry="primitive: ring; radiusInner: 0.01; radiusOuter: 0.02">
      </a-cursor>

      <!-- HUD SCORE -->
      <a-text
        id="scoreText"
        value="Score: 0"
        position="0 0.9 -1"
        align="center"
        width="2"
        color="#0f0">
      </a-text>

      <!-- COUNTDOWN -->
      <a-text
        id="countdown"
        value="3"
        position="0 0 -1.5"
        align="center"
        width="4">
      </a-text>

    </a-camera>
  </a-entity>

  <!-- LIGHTS -->
  <a-entity light="type: ambient; intensity: 0.6"></a-entity>
  <a-entity light="type: directional; intensity: 0.8" position="1 3 1"></a-entity>

  <!-- FLOOR CONTAINER -->
  <a-entity id="floor-group"></a-entity>

</a-scene>

<script>
// ----------------
// GAME STATE
// ----------------
let score = 0;
let gameStarted = false;

// ----------------
// CONSTANTS
// ----------------
const FLOOR_COUNT = 5;
const FLOOR_LENGTH = 20;

// ----------------
// PLAYER MOVEMENT
// ----------------
AFRAME.registerComponent('movement', {
  tick: function (time, dt) {
    if (!gameStarted) return;
    this.el.object3D.position.z -= dt * 0.002;
  }
});

// ----------------
// TARGET COMPONENT
// ----------------
AFRAME.registerComponent('target', {
  init: function () {
    this.player = document.querySelector('#player');

    this.el.addEventListener('click', () => {
      increaseScore();
      repositionTarget(this.el);
    });
  },

  tick: function () {
    const playerZ = this.player.object3D.position.z;
    if (this.el.object3D.position.z > playerZ - 1) {
      repositionTarget(this.el);
    }
  }
});

// ----------------
// FLOOR TILE COMPONENT
// ----------------
AFRAME.registerComponent('floor-tile', {
  tick: function () {
    const playerZ = document.querySelector('#player').object3D.position.z;
    const tileZ = this.el.object3D.position.z;

    if (tileZ > playerZ + FLOOR_LENGTH) {
      this.el.object3D.position.z -= FLOOR_LENGTH * FLOOR_COUNT;
    }
  }
});

// ----------------
// FUNCTIONS
// ----------------
function increaseScore() {
  score++;
  document.querySelector('#scoreText')
    .setAttribute('value', 'Score: ' + score);
}

function repositionTarget(el) {
  const playerZ = document.querySelector('#player').object3D.position.z;
  el.setAttribute('position', {
    x: (Math.random() * 8) - 4,
    y: 1,
    z: playerZ - 10 - Math.random() * 6
  });
}

function spawnTargets(n) {
  const scene = document.querySelector('a-scene');
  for (let i = 0; i < n; i++) {
    const box = document.createElement('a-box');
    box.setAttribute('width', 1);
    box.setAttribute('height', 1);
    box.setAttribute('depth', 1);
    box.setAttribute('color', 'tomato');
    box.setAttribute('target', '');
    scene.appendChild(box);
    repositionTarget(box);
  }
}

function createFloor() {
  const floorGroup = document.querySelector('#floor-group');

  for (let i = 0; i < FLOOR_COUNT; i++) {
    const floor = document.createElement('a-plane');
    floor.setAttribute('rotation', '-90 0 0');
    floor.setAttribute('width', 20);
    floor.setAttribute('height', FLOOR_LENGTH);
    floor.setAttribute('color', '#333');
    floor.setAttribute('position', `0 0 ${-i * FLOOR_LENGTH}`);
    floor.setAttribute('floor-tile', '');
    floorGroup.appendChild(floor);
  }
}

// ----------------
// COUNTDOWN
// ----------------
function startCountdown() {
  const el = document.querySelector('#countdown');
  let c = 3;

  const timer = setInterval(() => {
    if (c > 0) el.setAttribute('value', c);
    else if (c === 0) el.setAttribute('value', 'GO!');
    else {
      clearInterval(timer);
      el.setAttribute('visible', false);
      gameStarted = true;
    }
    c--;
  }, 1000);
}

// ----------------
// INIT
// ----------------
window.addEventListener('load', () => {
  createFloor();
  spawnTargets(5);
  startCountdown();
});
</script>

</body>
</html>
